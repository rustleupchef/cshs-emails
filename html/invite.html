<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #5568d3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="email"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="email"]::placeholder {
            color: #999;
        }

        button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:active {
            transform: scale(0.98);
        }

        .email-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .email-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            background: #f5f5f5;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            animation: slideIn 0.3s ease-out;
        }

        .email-item:hover {
            background: #efefef;
        }

        .email-text {
            color: #333;
            font-size: 14px;
            flex: 1;
            word-break: break-all;
        }

        .delete-btn {
            background: #ff6b6b;
            padding: 6px 12px;
            font-size: 12px;
            margin-left: 10px;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            background: #ee5a52;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 30px 20px;
            font-size: 14px;
        }

        .error {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .count {
            color: #667eea;
            font-weight: 600;
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }

        .send-btn {
            width: 100%;
            padding: 14px;
            background: #5568d3;
            margin-top: 25px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .send-btn:hover {
            opacity: 0.9;
            background: #5568d3;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .success {
            color: #22c55e;
            font-size: 12px;
            margin-top: 5px;
            display: none;
            text-align: center;
        }

        .success.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Email List</h1>
        
        <div class="input-group">
            <input 
                type="email" 
                id="emailInput" 
                placeholder="Enter an email address"
                autocomplete="off"
            >
            <button onclick="addEmail()">Add</button>
        </div>

        <div class="error" id="error"></div>

        <div id="listContainer">
            <div class="empty-state">No emails added yet</div>
        </div>

        <div class="count">
            <span id="count">0</span> email(s)
        </div>

        <button class="send-btn" id="sendBtn" onclick="sendEmails()">Send Emails</button>
        <div class="success" id="success">Emails sent successfully! ✓</div>
    </div>

    <script>
        const emailInput = document.getElementById('emailInput');
        const listContainer = document.getElementById('listContainer');
        const countElement = document.getElementById('count');
        const errorElement = document.getElementById('error');
        const sendBtn = document.getElementById('sendBtn');
        const successElement = document.getElementById('success');
        let emails = [];

        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addEmail();
            }
        });

        function addEmail() {
            const email = emailInput.value.trim();
            errorElement.classList.remove('show');

            if (!email) {
                showError('Please enter an email address');
                return;
            }

            if (!isValidEmail(email)) {
                showError('Please enter a valid email address');
                return;
            }

            if (emails.includes(email)) {
                showError('This email is already in the list');
                return;
            }

            emails.push(email);
            emailInput.value = '';
            emailInput.focus();
            render();
        }

        function deleteEmail(email) {
            emails = emails.filter(e => e !== email);
            render();
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function showError(message) {
            errorElement.textContent = message;
            errorElement.classList.add('show');
            emailInput.focus();
        }

        function render() {
            countElement.textContent = emails.length;

            if (emails.length === 0) {
                listContainer.innerHTML = '<div class="empty-state">No emails added yet</div>';
                return;
            }

            const emailList = document.createElement('div');
            emailList.className = 'email-list';
            
            emails.forEach(email => {
                const item = document.createElement('div');
                item.className = 'email-item';
                item.innerHTML = `
                    <span class="email-text">${email}</span>
                    <button class="delete-btn" onclick="deleteEmail('${email}')">Delete</button>
                `;
                emailList.appendChild(item);
            });

            listContainer.innerHTML = '';
            listContainer.appendChild(emailList);
        }

        function sendEmails() {
            if (emails.length === 0) {
                showError('Please add at least one email before sending');
                return;
            }

            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';
            successElement.classList.remove('show');
            errorElement.classList.remove('show');

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/invite');
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function () {
                if (xhr.status == 200 && xhr.readyState === 4) {
                    successElement.classList.add('show');
                    sendBtn.disabled = false;
                    sendBtn.textContent = 'Send Emails';

                    setTimeout(() => {
                        successElement.classList.remove('show');
                    }, 3000);
                }
            };
            xhr.send(JSON.stringify({ people: emails }));
        }

        render();
    </script>
</body>
</html>
